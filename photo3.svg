
// Smooth nav
const links = document.querySelectorAll('nav a');
links.forEach(a=>a.addEventListener('click', e=>{
  e.preventDefault();
  document.querySelector(a.getAttribute('href')).scrollIntoView({behavior:'smooth'});
}));

// Hearts animation
function startHearts(){
  const left = document.querySelector('.heart-left');
  const right = document.querySelector('.heart-right');
  const center = document.querySelector('.heart-center');
  const speech = document.querySelector('.speech');
  if(!left||!right||!center||!speech) return;
  left.classList.add('show');
  right.classList.add('show');
  setTimeout(()=>{
    center.classList.add('show');
    speech.classList.add('show');
    [left,right,center].forEach((el,i)=>{
      el.animate([
        { transform: el.style.transform + ' scale(1)' },
        { transform: el.style.transform + ' scale(1.08)' },
        { transform: el.style.transform + ' scale(1)'}
      ], { duration: 600, delay: i*80, iterations: 2 });
    });
  }, 1400);
}
window.addEventListener('load', startHearts);

// Carousel
const track = document.querySelector('.carousel-track');
if(track){
  const slides = Array.from(document.querySelectorAll('.slide'));
  let idx = 0;
  const dots = Array.from(document.querySelectorAll('.dot'));
  function updateCarousel(){
    track.style.transform = `translateX(${-idx*100}%)`;
    dots.forEach((d,i)=>d.classList.toggle('active', i===idx));
  }
  const prev = document.querySelector('#prev');
  const next = document.querySelector('#next');
  if(prev) prev.addEventListener('click',()=>{idx=(idx-1+slides.length)%slides.length;updateCarousel();});
  if(next) next.addEventListener('click',()=>{idx=(idx+1)%slides.length;updateCarousel();});
  window.addEventListener('keydown', (e)=>{
    if(e.key==='ArrowRight'){idx=(idx+1)%slides.length;updateCarousel();}
    if(e.key==='ArrowLeft'){idx=(idx-1+slides.length)%slides.length;updateCarousel();}
  });
}

// Secret lock
const input = document.querySelector('#answer');
const unlockBtn = document.querySelector('#unlock');
const success = document.querySelector('.success');
const error = document.querySelector('.error');
function normalize(s){ return (s||'').toString().trim().toLowerCase(); }
if(unlockBtn){
  unlockBtn.addEventListener('click', ()=>{
    const val = normalize(input && input.value);
    if(val === 'pannikutty'){
      if(error) error.style.display = 'none';
      if(success) success.style.display = 'block';
      confetti();
      const sc = document.querySelector('#secret-content');
      if(sc) sc.scrollIntoView({behavior:'smooth'});
    } else {
      if(success) success.style.display = 'none';
      if(error) error.style.display = 'block';
    }
  });
}

// small confetti
function confetti(){
  const n = 60;
  for(let i=0;i<n;i++){
    const piece = document.createElement('div');
    piece.className='confetti';
    piece.style.cssText=`position:fixed;top:-10px;left:${Math.random()*100}vw;width:10px;height:14px;background:hsl(${Math.random()*360},80%,70%);transform:rotate(${Math.random()*360}deg);opacity:.9;z-index:9999;`;
    document.body.appendChild(piece);
    const duration = 2000 + Math.random()*1500;
    piece.animate([
      { transform: piece.style.transform, top:'-10px' },
      { transform: 'translateY(100vh) rotate(720deg)', top:'100vh' }
    ], { duration, easing:'cubic-bezier(.2,.8,.2,1)' }).onfinish = ()=> piece.remove();
  }
}

